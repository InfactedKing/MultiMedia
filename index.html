<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MultiMedia — movies, shows & games</title>
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main id="app"></main>
  </div>

  <!-- Rating modal (mark as finished / edit entry) -->
  <div class="modal-backdrop hidden" id="rating-modal">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <h2 id="modal-title">Log it</h2>
      <p class="modal-subtitle" id="modal-item-title"></p>
      <div class="star-picker" id="star-picker" aria-label="Rating from 0.5 to 5 stars"></div>
      <p class="star-label" id="star-label">Tap a star to rate</p>

      <!-- TV shows: season progress -->
      <div id="tv-fields" class="hidden">
        <label class="field">
          <span>Seasons watched</span>
          <input type="number" id="seasons-watched" min="0" max="99" placeholder="e.g. 3" />
        </label>
        <label class="field">
          <span>Show status</span>
          <select id="show-status">
            <option value="finished">✓ Finished the show</option>
            <option value="watching">▶ Still watching</option>
          </select>
        </label>
      </div>

      <!-- Games: extra fields under "More options" -->
      <div id="game-fields" class="hidden">
        <button type="button" class="more-toggle" id="more-toggle">▸ More options</button>
        <div id="more-options" class="hidden">
          <label class="field">
            <span>Hours played (around) <em>(optional)</em></span>
            <select id="game-hours">
              <option value="">—</option>
              <option value="10">~10h</option>
              <option value="20">~20h</option>
              <option value="50">~50h</option>
              <option value="100">~100h</option>
              <option value="250">~250h</option>
              <option value="500">~500h</option>
              <option value="1000+">1000h+</option>
            </select>
          </label>
          <label class="field">
            <span>Your rank <em>(optional)</em></span>
            <input type="text" id="game-rank" placeholder="e.g. Gold 2, Immortal, 1800 elo" />
          </label>
          <label class="check-field">
            <input type="checkbox" id="game-competitive" />
            <span>⚔️ Competitive / endless — this game can't be finished</span>
          </label>
        </div>
      </div>

      <label class="field">
        <span id="finish-date-label">Date finished</span>
        <input type="date" id="finish-date" />
      </label>
      <label class="field">
        <span>Notes <em>(optional)</em></span>
        <textarea id="finish-note" rows="3" placeholder="What did you think?"></textarea>
      </label>
      <div class="modal-actions">
        <button class="btn btn-danger hidden" id="modal-delete">Remove from diary</button>
        <button class="btn btn-primary" id="modal-save" disabled>Save to diary</button>
      </div>
    </div>
  </div>

  <!-- Media preview modal -->
  <div class="modal-backdrop hidden" id="preview-modal">
    <div class="modal modal-wide" id="preview-content"></div>
  </div>

  <script src="data.js?v=5"></script>
  <script src="api.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
