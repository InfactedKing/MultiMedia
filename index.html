<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MultiMedia — movies, shows & games</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main id="app"></main>
  </div>

  <!-- Rating modal (mark as finished / edit entry) -->
  <div class="modal-backdrop hidden" id="rating-modal">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <h2 id="modal-title">Log it</h2>
      <p class="modal-subtitle" id="modal-item-title"></p>
      <div class="star-picker" id="star-picker" aria-label="Rating from 1 to 5 stars">
        <button data-star="1">★</button>
        <button data-star="2">★</button>
        <button data-star="3">★</button>
        <button data-star="4">★</button>
        <button data-star="5">★</button>
      </div>
      <p class="star-label" id="star-label">Tap a star to rate</p>
      <label class="field">
        <span>Date finished</span>
        <input type="date" id="finish-date" />
      </label>
      <label class="field">
        <span>Notes <em>(optional)</em></span>
        <textarea id="finish-note" rows="3" placeholder="What did you think?"></textarea>
      </label>
      <div class="modal-actions">
        <button class="btn btn-danger hidden" id="modal-delete">Remove from diary</button>
        <button class="btn btn-primary" id="modal-save" disabled>Save to diary</button>
      </div>
    </div>
  </div>

  <script src="data.js?v=2"></script>
  <script src="api.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
